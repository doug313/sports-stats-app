[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    requires_db: tests that need Lahman database loaded
    requires_retro: tests that need Retrosheet tables loaded
    requires_api_key: tests that need ANTHROPIC_API_KEY set
    live: tests that hit real external APIs (MLB StatsAPI)

# Output
addopts =
    -v
    --tb=short
    --no-header
    -rN

# Don't fail on warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
